<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cuisine — 25 avril">
<title>Cuisine — 25 avril 2025</title>
<style>
:root {
  --bg:#fff; --bg2:#f5f5f4; --bg3:#eceae6;
  --text:#1a1a1a; --text2:#6b6b6b;
  --border:rgba(0,0,0,0.12); --border2:rgba(0,0,0,0.22);
  --blue:#185FA5; --bl:#E6F1FB; --bld:#0C447C;
  --green:#1D9E75; --gl:#E1F5EE; --gld:#085041;
  --amber:#BA7517; --al:#FAEEDA; --ald:#633806;
  --orange:#D85A30; --ol:#FDEEE8; --old:#8B2A0F;
  --r:8px; --rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e; --bg2:#2c2c2e; --bg3:#3a3a3c;
  --text:#f2f2f7; --text2:#aeaeb2;
  --border:rgba(255,255,255,0.12); --border2:rgba(255,255,255,0.22);
  --bl:#0c2d4a; --bld:#85B7EB;
  --gl:#0a2e22; --gld:#5DCAA5;
  --al:#2e1f05; --ald:#FAC775;
  --ol:#2e1205; --old:#F4956A;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:16px}
.app{padding:.75rem;max-width:520px;margin:0 auto}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px}
.hdr h1{font-size:18px;font-weight:600}
.badge{font-size:10px;background:var(--ol);color:var(--old);padding:3px 8px;border-radius:var(--r);white-space:nowrap;font-weight:600}
.live{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);font-weight:600}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1rem}
.stat{background:var(--bg2);border-radius:var(--r);padding:8px 10px}
.stat .v{font-size:18px;font-weight:600}
.stat .l{font-size:10px;color:var(--text2);margin-top:1px}
.tscroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:1rem;scrollbar-width:none}
.tscroll::-webkit-scrollbar{display:none}
.tbtn{padding:8px 16px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);cursor:pointer;font-size:14px;white-space:nowrap;position:relative;flex-shrink:0;min-height:42px;font-weight:500}
.tbtn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.tbtn .dot{position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--amber)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:1rem;margin-bottom:.875rem}
.ctitle{font-size:14px;font-weight:600;margin-bottom:12px}
.empty{text-align:center;padding:2rem;color:var(--text2);font-size:13px}
.connecting{text-align:center;padding:3rem;color:var(--text2);font-size:14px}
.ticket{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:8px}
.ticket.new{border-color:var(--amber);animation:npulse 2s ease-in-out 3}
@keyframes npulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 3px var(--al)}}
.ticket.cooking{border-color:var(--orange)}
.ticket.ready{border-color:var(--green)}
.ticket-hdr{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--bg2);cursor:pointer}
.ticket.new .ticket-hdr{background:var(--al)}
.ticket.cooking .ticket-hdr{background:var(--ol)}
.ticket.ready .ticket-hdr{background:var(--gl)}
.ttag{min-width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:var(--bl);color:var(--bld)}
.ticket.new .ttag{background:var(--al);color:var(--ald);border:2px solid var(--amber)}
.ticket.cooking .ttag{background:var(--ol);color:var(--old);border:2px solid var(--orange)}
.ticket.ready .ttag{background:var(--gl);color:var(--gld);border:2px solid var(--green)}
.tname{flex:1;font-size:14px;font-weight:600}
.ttime{font-size:11px;color:var(--text2);margin-right:6px}
.sbadge-new{font-size:10px;background:var(--al);color:var(--ald);padding:3px 8px;border-radius:99px;font-weight:700;white-space:nowrap}
.sbadge-cooking{font-size:10px;background:var(--ol);color:var(--old);padding:3px 8px;border-radius:99px;font-weight:700;white-space:nowrap}
.sbadge-ready{font-size:10px;background:var(--gl);color:var(--gld);padding:3px 8px;border-radius:99px;font-weight:700;white-space:nowrap}
.sbadge-served{font-size:10px;background:var(--bl);color:var(--bld);padding:3px 8px;border-radius:99px;font-weight:700;white-space:nowrap}
.ticket-body{padding:10px 12px;border-top:1px solid var(--border);display:none}
.ticket-body.open{display:block}
.pline{font-size:14px;font-weight:600;padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.pline:last-of-type{border-bottom:none}
.pline .emoji{font-size:18px;width:26px;text-align:center}
.pline .qty{font-size:12px;background:var(--bg3);color:var(--text2);padding:1px 6px;border-radius:99px;margin-left:auto;font-weight:700}
.kacts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.kbtn{padding:9px 16px;border-radius:var(--r);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text);min-height:40px;font-weight:600;flex:1;text-align:center}
.kbtn:active{transform:scale(.95)}
.kbtn.cook{background:var(--orange);color:#fff;border-color:var(--orange)}
.kbtn.ready{background:var(--green);color:#fff;border-color:var(--green)}
.kbtn.unready{background:var(--bg2);color:var(--text2);font-size:12px}
.table-sep{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;margin:12px 0 6px;padding:6px 10px;background:var(--bg2);border-radius:var(--r)}
.sound-btn{padding:6px 12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text2);cursor:pointer;font-size:13px;min-height:34px;font-weight:500}
.sound-btn.on{background:var(--gl);color:var(--gld);border-color:var(--green)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div><h1>🍳 Cuisine</h1><span class="badge">25 avril 2025</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="sound-btn on" id="sound-btn" onclick="toggleSound()">🔔 Son</button>
      <div class="live" id="live-status"><span class="live-dot"></span>Connexion…</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="s-new">0</div><div class="l">Nouvelles</div></div>
    <div class="stat"><div class="v" id="s-cook">0</div><div class="l">En prépa</div></div>
    <div class="stat"><div class="v" id="s-ready">0</div><div class="l">Prêtes</div></div>
    <div class="stat"><div class="v" id="s-done">0</div><div class="l">Servies</div></div>
  </div>

  <div class="tscroll" id="tbl-sel"></div>

  <div class="card">
    <div class="ctitle" id="table-title">Toutes les tables</div>
    <div id="tickets-list"><div class="connecting">Connexion à Firebase…</div></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const T = 8, G = 7;
const ACC    = [{id:'riz',label:'Riz pilaf',e:'🍚'},{id:'igname',label:"Frites d'ignames",e:'🍟'},{id:'plantain',label:'Frites de banane plantain',e:'🍌'}];
const ACC_EX = [{id:'riz-supp',label:'Riz supp.',e:'🍚'},{id:'igname-supp',label:'Ignames supp.',e:'🍟'},{id:'plantain-supp',label:'Plantain supp.',e:'🍌'}];
const OTH_EX = [{id:'viande-extra',label:'Viandes extra',e:'🥩'},{id:'degue-extra',label:'Dégué supp.',e:'🥣'}];
const ALL_EX = [...ACC_EX,...OTH_EX];

let orders = {};
for (let t = 1; t <= T; t++) orders[t] = {};
let curT = 'all';
let soundOn = true;
let knownOrders = new Set();
let firstLoad = true;

const FB_CONFIG = {
  apiKey: "AIzaSyBg6vVAIBrmmx23BogWnRx3ZW7BMeSqu7w",
  authDomain: "commandes-25avril.firebaseapp.com",
  projectId: "commandes-25avril",
  storageBucket: "commandes-25avril.firebasestorage.app",
  messagingSenderId: "359129430877",
  appId: "1:359129430877:web:d60ac1a3e6dfc7596746b4"
};

firebase.initializeApp(FB_CONFIG);
const db = firebase.firestore();
db.enablePersistence({synchronizeTabs:true}).catch(e => console.warn('Persistence:',e));

// ─── SON ──────────────────────────────────────────────────────────────────────
function playBeep() {
  if (!soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0,150,300].forEach(delay => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; o.type = 'sine';
      g.gain.setValueAtTime(0, ctx.currentTime + delay/1000);
      g.gain.linearRampToValueAtTime(0.4, ctx.currentTime + delay/1000 + 0.05);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime + delay/1000 + 0.25);
      o.start(ctx.currentTime + delay/1000);
      o.stop(ctx.currentTime + delay/1000 + 0.3);
    });
  } catch(e) {}
}

function toggleSound() {
  soundOn = !soundOn;
  const btn = document.getElementById('sound-btn');
  btn.textContent = soundOn ? '🔔 Son' : '🔕 Muet';
  btn.className = 'sound-btn' + (soundOn ? ' on' : '');
}

// ─── FIREBASE ÉCOUTE ──────────────────────────────────────────────────────────
let unsubscribe = null, reconnectTimer = null, lastUpdate = Date.now();

function startListen() {
  if (unsubscribe) unsubscribe();
  unsubscribe = db.collection('evenement').doc('data').onSnapshot(snap => {
    lastUpdate = Date.now();
    document.getElementById('live-status').innerHTML = '<span class="live-dot"></span>En direct';
    if (!snap.exists) {
      document.getElementById('tickets-list').innerHTML = '<div class="connecting">Aucune commande encore.</div>';
      buildTables(); updStats(); return;
    }
    const d = snap.data();
    const newIds = new Set();
    let hasNew = false;
    if (d.orders) {
      for (let t = 1; t <= T; t++) {
        const src = d.orders[t] || d.orders[String(t)] || {};
        orders[t] = {};
        Object.keys(src).forEach(g => {
          orders[t][Number(g)] = src[g];
          Object.keys(src[g]).forEach(rk => {
            const id = t+'_'+g+'_'+rk;
            newIds.add(id);
            if (!firstLoad && !knownOrders.has(id)) hasNew = true;
          });
        });
      }
      for (let t = 1; t <= T; t++) if (!orders[t]) orders[t] = {};
    }
    if (hasNew) playBeep();
    knownOrders = newIds;
    firstLoad = false;
    buildTables(); renderTickets(); updStats();
  }, err => {
    document.getElementById('live-status').innerHTML = '<span style="color:#D85A30">⚠ Hors ligne — reconnexion…</span>';
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(startListen, 5000);
  });
}
setInterval(() => { if (Date.now()-lastUpdate > 30000) startListen(); }, 15000);
document.addEventListener('visibilitychange', () => { if (document.visibilityState==='visible') startListen(); });

// ─── SYNC ─────────────────────────────────────────────────────────────────────
function syncFirebase() {
  db.collection('evenement').doc('data').set({orders})
    .then(() => { renderTickets(); updStats(); })
    .catch(e => console.warn('Erreur sync:',e));
}

function stamp() {
  const n = new Date();
  return { at: n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0'), date: n.toLocaleDateString('fr-FR') };
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function setCooking(t,g,rk) {
  if (!orders[t][g]||!orders[t][g][rk]) return;
  const s = stamp();
  orders[t][g][rk].kitchenStatus = 'cooking';
  orders[t][g][rk].cookingAt = s.at;
  orders[t][g][rk].cookingDate = s.date;
  syncFirebase();
}
function setReady(t,g,rk) {
  if (!orders[t][g]||!orders[t][g][rk]) return;
  const s = stamp();
  orders[t][g][rk].kitchenStatus = 'ready';
  orders[t][g][rk].readyAt = s.at;
  orders[t][g][rk].readyDate = s.date;
  syncFirebase();
}
function unsetReady(t,g,rk) {
  if (!orders[t][g]||!orders[t][g][rk]) return;
  orders[t][g][rk].kitchenStatus = 'cooking';
  delete orders[t][g][rk].readyAt;
  delete orders[t][g][rk].readyDate;
  syncFirebase();
}

// ─── TABLES NAV ───────────────────────────────────────────────────────────────
function buildTables() {
  const el = document.getElementById('tbl-sel');
  el.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'tbtn'+(curT==='all'?' active':'');
  all.textContent = 'Toutes';
  all.onclick = () => { curT='all'; buildTables(); renderTickets(); };
  el.appendChild(all);
  for (let t = 1; t <= T; t++) {
    const b = document.createElement('button');
    b.className = 'tbtn'+(curT===t?' active':'');
    const hasPending = Object.keys(orders[t]||{}).some(g =>
      Object.keys(orders[t][g]).some(rk => { const ks=orders[t][g][rk].kitchenStatus; return !ks||ks==='cooking'; })
    );
    const n = Object.keys(orders[t]||{}).length;
    b.innerHTML = 'Table '+t+(hasPending&&n>0?'<span class="dot"></span>':'');
    b.onclick = (t=>()=>{ curT=t; buildTables(); renderTickets(); })(t);
    el.appendChild(b);
  }
}

// ─── RENDU ────────────────────────────────────────────────────────────────────
function renderKitchenItems(o) {
  let html = '';
  if (o.plat==='viande') html += '<div class="pline"><span class="emoji">🥩</span><span>Assortiment viandes</span></div>';
  ACC.forEach(i => {
    const qty=(o.acc||{})[i.id]||0;
    if (qty>0) html += '<div class="pline"><span class="emoji">'+i.e+'</span><span>'+i.label+'</span>'+(qty>1?'<span class="qty">×'+qty+'</span>':'')+'</div>';
  });
  if (o.dessert==='degue') html += '<div class="pline"><span class="emoji">🥣</span><span>Dégué</span></div>';
  ALL_EX.forEach(i => {
    const qty=(o.ex||{})[i.id]||0;
    if (qty>0) html += '<div class="pline"><span class="emoji">'+i.e+'</span><span>'+i.label+'</span>'+(qty>1?'<span class="qty">×'+qty+'</span>':'')+'</div>';
  });
  // ─── Menu enfant ────────────────────────────────────────────────────────────
  if (o.child) {
    const c = o.child;
    const mockLabels = {mocktail1:'Soleil de Dakar',mocktail2:'Soleil épicé'};
    const accIcons   = {riz:'🍚',igname:'🍟',plantain:'🍌'};
    const accLabels  = {riz:'Riz pilaf',igname:"Frites d'ignames",plantain:'Frites de banane plantain'};
    html += '<div class="pline" style="border-top:2px dashed var(--border);margin-top:4px;padding-top:8px"><span class="emoji">🧒</span><span style="font-weight:700">Menu enfant</span></div>';
    if (c.plat==='viande') html += '<div class="pline" style="padding-left:16px"><span class="emoji">🥩</span><span>Portion de viandes</span></div>';
    ['riz','igname','plantain'].forEach(function(id){
      if (c.acc && c.acc[id]) html += '<div class="pline" style="padding-left:16px"><span class="emoji">'+accIcons[id]+'</span><span>'+accLabels[id]+'</span></div>';
    });
    if (c.dessert==='degue') html += '<div class="pline" style="padding-left:16px"><span class="emoji">🥣</span><span>Dégué</span></div>';
    if (c.mock && mockLabels[c.mock]) html += '<div class="pline" style="padding-left:16px"><span class="emoji">🧃</span><span>'+mockLabels[c.mock]+'</span></div>';
  }
  if (!html) html = '<div style="font-size:13px;color:var(--text2);padding:6px 0">Boissons uniquement</div>';
  return html;
}

function renderTicketsForTable(t) {
  const tbl = orders[t]||{};
  let html = '';
  for (let g = 1; g <= G; g++) {
    const gO = tbl[g];
    if (!gO||Object.keys(gO).length===0) continue;
    const rks = Object.keys(gO).sort();
    rks.forEach(rk => {
      const o = gO[rk];
      const ks = o.served ? 'served' : (o.kitchenStatus||'new');
      const rNum = rks.length>1?' Svc '+rk.replace('r',''):'';
      const label = 'T'+t+' · C'+g+rNum;

      let badge='', cls='';
      if (ks==='new')     { badge='<span class="sbadge-new">Nouvelle</span>';     cls='new'; }
      if (ks==='cooking') { badge='<span class="sbadge-cooking">🔥 En prépa</span>'; cls='cooking'; }
      if (ks==='ready')   { badge='<span class="sbadge-ready">✅ Prête</span>';    cls='ready'; }
      if (ks==='served')  { badge='<span class="sbadge-served">Servie</span>';     cls='served'; }

      const timeLabel = o.cookingAt ? '<span class="ttime">Débuté '+o.cookingAt+'</span>' : '';

      let actions = '<div class="kacts">';
      if (ks==='new') {
        actions += '<button class="kbtn cook" onclick="setCooking('+t+','+g+',\''+rk+'\')">🔥 En préparation</button>';
        actions += '<button class="kbtn ready" onclick="setReady('+t+','+g+',\''+rk+'\')">✅ Prêt à envoyer</button>';
      } else if (ks==='cooking') {
        actions += '<button class="kbtn ready" onclick="setReady('+t+','+g+',\''+rk+'\')">✅ Prêt à envoyer</button>';
      } else if (ks==='ready') {
        actions += '<button class="kbtn unready" onclick="unsetReady('+t+','+g+',\''+rk+'\')">↩ Remettre en prépa</button>';
      }
      actions += '</div>';

      html +=
        '<div class="ticket '+cls+'">' +
          '<div class="ticket-hdr" onclick="this.nextElementSibling.classList.toggle(\'open\')">' +
            '<div class="ttag">C'+g+'</div>' +
            '<span class="tname">'+label+'</span>' +
            timeLabel+badge +
          '</div>' +
          '<div class="ticket-body open">'+renderKitchenItems(o)+actions+'</div>' +
        '</div>';
    });
  }
  return html;
}

function renderTickets() {
  const el = document.getElementById('tickets-list');
  const title = document.getElementById('table-title');
  let html = '';
  if (curT==='all') {
    title.textContent = 'Toutes les tables';
    for (let t=1;t<=T;t++) {
      const n = Object.keys(orders[t]||{}).length;
      if (!n) continue;
      html += '<div class="table-sep">TABLE '+t+' — '+n+'/7 couverts</div>';
      html += renderTicketsForTable(t);
    }
  } else {
    title.textContent = 'Table '+curT;
    html = renderTicketsForTable(curT);
  }
  el.innerHTML = html||'<div class="empty">Aucune commande</div>';
}

function updStats() {
  let sN=0,sC=0,sR=0,sD=0;
  for (let t=1;t<=T;t++) {
    Object.keys(orders[t]||{}).forEach(g => {
      Object.keys(orders[t][g]).forEach(rk => {
        const o=orders[t][g][rk], ks=o.kitchenStatus||'new';
        if (o.served) sD++;
        else if (ks==='ready')   sR++;
        else if (ks==='cooking') sC++;
        else sN++;
      });
    });
  }
  document.getElementById('s-new').textContent  = sN;
  document.getElementById('s-cook').textContent = sC;
  document.getElementById('s-ready').textContent= sR;
  document.getElementById('s-done').textContent = sD;
}

startListen();
</script>
</body>
</html>
