<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Chef — 25 avril">
<title>Chef — Supervision 25 avril 2025</title>
<style>
:root {
  --bg:#fff; --bg2:#f5f5f4; --bg3:#eceae6;
  --text:#1a1a1a; --text2:#6b6b6b;
  --border:rgba(0,0,0,0.12); --border2:rgba(0,0,0,0.22);
  --blue:#185FA5; --bl:#E6F1FB; --bld:#0C447C;
  --green:#1D9E75; --gl:#E1F5EE; --gld:#085041;
  --amber:#BA7517; --al:#FAEEDA; --ald:#633806;
  --purple:#7F77DD;
  --r:8px; --rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e; --bg2:#2c2c2e; --bg3:#3a3a3c;
  --text:#f2f2f7; --text2:#aeaeb2;
  --border:rgba(255,255,255,0.12); --border2:rgba(255,255,255,0.22);
  --bl:#0c2d4a; --bld:#85B7EB;
  --gl:#0a2e22; --gld:#5DCAA5;
  --al:#2e1f05; --ald:#FAC775;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:16px}
.app{padding:.75rem;max-width:520px;margin:0 auto}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px}
.hdr h1{font-size:18px;font-weight:600}
.badge{font-size:10px;background:var(--bl);color:var(--bld);padding:3px 8px;border-radius:var(--r);white-space:nowrap}
.live{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);font-weight:600}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:1rem}
.stat{background:var(--bg2);border-radius:var(--r);padding:8px 10px}
.stat .v{font-size:18px;font-weight:600}
.stat .l{font-size:10px;color:var(--text2);margin-top:1px}
.tscroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:1rem;scrollbar-width:none}
.tscroll::-webkit-scrollbar{display:none}
.tbtn{padding:8px 16px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);cursor:pointer;font-size:14px;white-space:nowrap;position:relative;flex-shrink:0;min-height:42px;font-weight:500}
.tbtn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.tbtn .dot{position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--green)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:1rem;margin-bottom:.875rem}
.ctitle{font-size:14px;font-weight:600;margin-bottom:12px}
.empty{text-align:center;padding:2rem;color:var(--text2);font-size:13px}
.olist{display:flex;flex-direction:column;gap:7px}
.orow{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.ohdr{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--bg2);cursor:pointer}
.gtag{min-width:30px;height:30px;border-radius:50%;background:var(--bl);color:var(--bld);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.gtag.paid{background:var(--gl);color:var(--gld)}
.oname{flex:1;font-size:14px;font-weight:600}
.otag{font-size:14px;font-weight:600;margin-right:4px}
.pbadge{font-size:10px;background:var(--gl);color:var(--gld);padding:3px 8px;border-radius:99px;white-space:nowrap;font-weight:600}
.sbadge{font-size:10px;background:var(--bl);color:var(--bld);padding:3px 8px;border-radius:99px;white-space:nowrap;font-weight:600}
.ubadge{font-size:10px;background:var(--al);color:var(--ald);padding:3px 8px;border-radius:99px;white-space:nowrap;font-weight:600}
.obody{padding:10px 12px;border-top:1px solid var(--border);display:none}
.obody.open{display:block}
.dline{font-size:13px;line-height:1.9}
.dline .cat{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;margin-right:2px}
.ssvc{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.ssvc:last-child{border-bottom:none;margin-bottom:0}
.nserv{margin-top:8px;padding:8px 10px;background:var(--bl);border-radius:var(--r);border:1px solid var(--blue)}
.nserv .nt{font-size:12px;font-weight:700;color:var(--bld)}
.nserv .nd{font-size:11px;color:var(--bld);margin-top:2px}
.npay{margin-top:8px;padding:8px 10px;background:var(--gl);border-radius:var(--r);border:1px solid var(--green)}
.npay .nt{font-size:12px;font-weight:700;color:var(--gld)}
.npay .nd{font-size:11px;color:var(--gld);margin-top:2px}
.oacts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.abtn{padding:8px 14px;border-radius:var(--r);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text);min-height:38px;font-weight:500}
.abtn:active{transform:scale(.95)}
.abtn.pay{background:var(--bg2);color:var(--text2);border-color:var(--border2)}
.abtn.pay.done{background:var(--green);color:#fff;border-color:var(--green);font-weight:600}
.abtn.unpay{background:var(--bg2);color:var(--text2)}
.rnbadge{font-size:11px;background:var(--bg2);color:var(--text2);padding:2px 7px;border-radius:99px;margin-left:5px}
.kbadge{font-size:10px;background:var(--gl);color:var(--gld);padding:3px 8px;border-radius:99px;white-space:nowrap;font-weight:700}
.kbadge-cooking{font-size:10px;background:var(--al);color:var(--ald);padding:3px 8px;border-radius:99px;white-space:nowrap;font-weight:600}
.ttl{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg2);border-radius:var(--r);margin-top:10px}
.ttl .tl{font-size:13px;color:var(--text2)}
.ttl .tv{font-size:15px;font-weight:700}
.connecting{text-align:center;padding:3rem;color:var(--text2);font-size:14px}
.expbtn{width:100%;margin-top:8px;padding:12px;background:var(--bg2);color:var(--text);border:1px solid var(--border2);border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;min-height:46px}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div><h1>Supervision chef — Vue cuisine</h1><span class="badge">25 avril 2025</span></div>
    <div class="live" id="live-status"><span class="live-dot"></span>Connexion…</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="s-done">0</div><div class="l">Commandes</div></div>
    <div class="stat"><div class="v" id="s-served">0</div><div class="l">Servis</div></div>
    <div class="stat"><div class="v" id="s-paid">0</div><div class="l">Réglés</div></div>
    <div class="stat"><div class="v" id="s-ca">0€</div><div class="l">CA total</div></div>
  </div>

  <div class="tscroll" id="tbl-sel"></div>

  <div class="card">
    <div class="ctitle" id="table-title">Toutes les tables</div>
    <div class="olist" id="orders-list"><div class="connecting">Aucune commande</div></div>
    <div class="ttl">
      <span class="tl">Total table</span>
      <span class="tv" id="table-total-val">0€</span>
    </div>
    <button class="expbtn" onclick="exportTxt()">Exporter récapitulatif (.txt)</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const T = 8, G = 7;
const ACC      = [{id:'riz',label:'Riz pilaf'},{id:'igname',label:"Frites d'ignames"},{id:'plantain',label:'Frites de banane plantain'}];
const SOFTS    = [{id:'bissape',label:'Bissap'},{id:'gingembre',label:'Jus de gingembre'}];
const MOCKTAILS= [{id:'mocktail1',label:'Soleil de Dakar'},{id:'mocktail2',label:'Soleil épicé'}];
const COCKTAILS= [{id:'cocktail1',label:'Bissap Rum Fresh'},{id:'cocktail2',label:'Gold District'}];
const DRINKS   = [...SOFTS,...MOCKTAILS,...COCKTAILS];
const ACC_EX   = [{id:'riz-supp',label:'Riz pilaf supplémentaire',pk:'riz-extra'},{id:'igname-supp',label:"Frites d'ignames supplémentaires",pk:'igname'},{id:'plantain-supp',label:'Frites de banane plantain supplémentaires',pk:'plantain'}];
const OTH_EX   = [{id:'viande-extra',label:'Portion assortiment viandes',pk:'viande-extra'},{id:'degue-extra',label:'Dégué supplémentaire',pk:'degue-extra'}];
const ALL_EX   = [...ACC_EX,...OTH_EX];

let prices = {igname:4,plantain:3,'riz-extra':2,bissape:2,gingembre:2,mocktail1:5,mocktail2:5,cocktail1:5,cocktail2:5,'viande-extra':7,'degue-extra':4};
let orders = {};
for (let t = 1; t <= T; t++) orders[t] = {};
let curT = 'all'; // 'all' ou numéro de table

const FB_CONFIG = {
  apiKey: "AIzaSyBg6vVAIBrmmx23BogWnRx3ZW7BMeSqu7w",
  authDomain: "commandes-25avril.firebaseapp.com",
  projectId: "commandes-25avril",
  storageBucket: "commandes-25avril.firebasestorage.app",
  messagingSenderId: "359129430877",
  appId: "1:359129430877:web:d60ac1a3e6dfc7596746b4"
};

firebase.initializeApp(FB_CONFIG);
const db = firebase.firestore();

// ─── Activation de la persistence offline (iOS/Android) ──────────────────────
db.enablePersistence({ synchronizeTabs: true }).catch(err => {
  if (err.code === 'failed-precondition') console.warn('Persistence: plusieurs onglets ouverts');
  else if (err.code === 'unimplemented')  console.warn('Persistence non supportée sur ce navigateur');
});

// ─── Écoute temps réel avec reconnexion automatique ──────────────────────────
let unsubscribe = null;
let reconnectTimer = null;
let lastUpdate = Date.now();

function startListen() {
  if (unsubscribe) unsubscribe(); // nettoyer l'ancienne écoute
  unsubscribe = db.collection('evenement').doc('data').onSnapshot(snap => {
    lastUpdate = Date.now();
    document.getElementById('live-status').innerHTML = '<span class="live-dot"></span>En direct';
    if (!snap.exists) {
      document.getElementById('orders-list').innerHTML = '<div class="connecting">Aucune donnée encore.</div>';
      buildTables(); updStats(); return;
    }
    const d = snap.data();
    if (d.prices) Object.assign(prices, d.prices);
    if (d.orders) {
      for (let t = 1; t <= T; t++) {
        const src = d.orders[t] || d.orders[String(t)] || {};
        orders[t] = {};
        Object.keys(src).forEach(g => { orders[t][Number(g)] = src[g]; });
      }
      for (let t = 1; t <= T; t++) if (!orders[t]) orders[t] = {};
    }
    buildTables(); renderOrders(); updStats();
  }, err => {
    console.warn('Erreur snapshot:', err);
    document.getElementById('live-status').innerHTML = '<span style="color:#D85A30">⚠ Hors ligne — reconnexion…</span>';
    // Reconnexion automatique après 5 secondes
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(startListen, 5000);
  });
}

// Détection perte de connexion (utile sur iOS en arrière-plan)
setInterval(() => {
  if (Date.now() - lastUpdate > 30000) { // 30s sans update
    document.getElementById('live-status').innerHTML = '<span style="color:#BA7517">⚠ Vérification…</span>';
    startListen(); // force reconnexion
  }
}, 15000);

// Reconnexion quand l'onglet redevient visible (retour depuis une autre app)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    document.getElementById('live-status').innerHTML = '<span class="live-dot"></span>Reconnexion…';
    startListen();
  }
});

startListen();

function buildTables() {
  const el = document.getElementById('tbl-sel');
  el.innerHTML = '';
  // Bouton "Tout"
  const all = document.createElement('button');
  all.className = 'tbtn' + (curT === 'all' ? ' active' : '');
  all.textContent = 'Toutes';
  all.onclick = () => { curT = 'all'; buildTables(); renderOrders(); };
  el.appendChild(all);
  for (let t = 1; t <= T; t++) {
    const b = document.createElement('button');
    b.className = 'tbtn' + (curT === t ? ' active' : '');
    const n = Object.keys(orders[t] || {}).length;
    b.innerHTML = 'Table ' + t + (n > 0 ? '<span class="dot"></span>' : '');
    b.onclick = (t => () => { curT = t; buildTables(); renderOrders(); updStats(); })(t);
    el.appendChild(b);
  }
}

function fmtList(list, qobj, lbl) {
  return list.filter(i => (qobj[i.id] || 0) > 0)
    .map(i => lbl(i) + (qobj[i.id] > 1 ? ' ×' + qobj[i.id] : '')).join(', ');
}

function renderTable(t) {
  const tbl = orders[t] || {};
  let html = '';

  // Afficher les 10 convives, même sans commande
  Object.keys(tbl).sort((a,b)=>a-b).forEach(g => {
    const gO = tbl[g];
    if (!gO || Object.keys(gO).length === 0) return;

    const rks      = Object.keys(gO).sort();
    const allPaid  = rks.every(r => gO[r].paid);
    const allServed= rks.every(r => gO[r].served);
    const gTot     = rks.reduce((s, r) => s + (gO[r].total || 0), 0);
    const wrap     = document.createElement('div');
    wrap.className = 'orow';
    let body = '';

    rks.forEach(rk => {
      const o = gO[rk], rNum = rk.replace('r', '');
      body += '<div class="ssvc">';
      if (rks.length > 1) body += '<div style="font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600">SERVICE ' + rNum + '</div>';
      let lines = '';
      if (o.plat) lines += '<div class="dline"><span class="cat">Plat </span>Assortiment viandes</div>';
      const accS = fmtList(ACC, o.acc || {}, i => i.label);
      if (accS) lines += '<div class="dline"><span class="cat">Acc. </span>' + accS + '</div>';
      if (o.dessert === 'degue') {
        const prevDeg = rks.filter(k => k !== rk && gO[k].dessert === 'degue').length > 0;
        lines += '<div class="dline"><span class="cat">Dessert </span>Dégué ' +
          (prevDeg
            ? '<span style="font-size:10px;color:var(--text2)">' + (prices['degue-extra'] || 4) + '€</span>'
            : '<span style="font-size:10px;background:var(--gl);color:var(--gld);padding:1px 5px;border-radius:99px">offert</span>') +
          '</div>';
      }
      const drS = fmtList(DRINKS, o.dr || {}, i => i.label);
      if (drS) lines += '<div class="dline"><span class="cat">Boissons </span>' + drS + '</div>';
      const exS = fmtList(ALL_EX, o.ex || {}, i => i.label);
      if (exS) lines += '<div class="dline"><span class="cat">Extras </span>' + exS + '</div>';
      // ─── Menu enfant ────────────────────────────────────────────────────────
      if (o.child) {
        const c = o.child;
        const mockLabel = {mocktail1:'Soleil de Dakar',mocktail2:'Soleil épicé'}[c.mock] || '';
        const accLabel = [
          c.acc && c.acc.riz      ? 'Riz pilaf'              : null,
          c.acc && c.acc.igname   ? "Frites d'ignames"       : null,
          c.acc && c.acc.plantain ? 'Frites de banane plantain' : null
        ].filter(Boolean).join(', ');
        lines += '<div class="dline" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">' +
                 '<span style="font-size:12px;font-weight:700;color:var(--purple)">🧒 Menu enfant — 15€</span></div>';
        if (c.plat === 'viande') lines += '<div class="dline" style="padding-left:12px"><span class="cat">Plat </span>Portion de viandes</div>';
        if (accLabel)            lines += '<div class="dline" style="padding-left:12px"><span class="cat">Acc. </span>' + accLabel + '</div>';
        if (c.dessert === 'degue') lines += '<div class="dline" style="padding-left:12px"><span class="cat">Dessert </span>Dégué</div>';
        if (mockLabel)           lines += '<div class="dline" style="padding-left:12px"><span class="cat">Boisson </span>' + mockLabel + '</div>';
      }
      body += lines || '<div style="font-size:13px;color:var(--text2)">Aucun item</div>';
      body += '<div style="display:flex;justify-content:space-between;margin-top:6px">' +
        '<span style="font-size:12px;color:var(--text2)">Sous-total</span>' +
        '<span style="font-size:13px;font-weight:700">' + (o.total || 0) + '€</span></div>';
      if (!o.served && o.kitchenStatus === 'ready') {
        body += '<div style="margin-top:6px;padding:8px 10px;background:var(--gl);border-radius:var(--r);border:1px solid var(--green)"><div style="font-size:12px;font-weight:700;color:var(--gld)">🟢 Prêt à être servi — ' + (o.readyAt || '') + '</div></div>';
      }
      if (!o.served && o.kitchenStatus === 'cooking') {
        body += '<div style="margin-top:6px;padding:8px 10px;background:var(--al);border-radius:var(--r);border:1px solid var(--amber)"><div style="font-size:12px;font-weight:700;color:var(--ald)">🟡 En préparation en cuisine</div></div>';
      }
      if (o.served) {
        body += '<div class="nserv"><div class="nt">✓ Service effectué</div><div class="nd">le ' + (o.servedDate || '–') + ' à ' + (o.servedAt || '–') + '</div></div>';
      }
      if (o.paid) {
        body += '<div class="npay"><div class="nt">✓ Paiement enregistré</div><div class="nd">' + (o.total || 0) + '€ — le ' + (o.paidDate || '–') + ' à ' + (o.paidAt || '–') + '</div></div>';
      }
      body += '<div class="oacts">';
      if (!o.paid) body += '<button class="abtn pay"      onclick="payGuest('   + t + ',' + g + ',\'' + rk + '\')">Réglé ✓</button>';
      else         body += '<button class="abtn pay done" onclick="unpayGuest(' + t + ',' + g + ',\'' + rk + '\')">Déjà réglé ✓</button>';
      body += '</div></div>';
    });

    const tLabel = curT === 'all' ? ' <span style="font-size:10px;color:var(--text2);font-weight:400">Table ' + t + '</span>' : '';
    wrap.innerHTML =
      '<div class="ohdr" onclick="togBody(this)">' +
        '<div class="gtag' + (allPaid ? ' paid' : '') + '">C' + g + '</div>' +
        '<span class="oname">Convive ' + g + tLabel + (rks.length > 1 ? ' <span class="rnbadge">' + rks.length + ' svc</span>' : '') + '</span>' +
        '<span class="otag">' + gTot + '€</span>' +
        (allServed ? '<span class="sbadge">Servi</span>' : '') +
        (rks.some(r => gO[r].kitchenStatus === 'ready' && !gO[r].served) ? '<span class="kbadge">🟢 Prêt</span>' : '') +
        (rks.some(r => gO[r].kitchenStatus === 'cooking') ? '<span class="kbadge-cooking">🟡 En prépa</span>' : '') +
        (allPaid   ? '<span class="pbadge">Réglé</span>' : '<span class="ubadge">En attente</span>') +
      '</div>' +
      '<div class="obody">' + body + '</div>';
    html += wrap.outerHTML;
  });
  return html;
}

function renderOrders() {
  const el    = document.getElementById('orders-list');
  const title = document.getElementById('table-title');
  let html    = '';
  let tabTot  = 0;

  if (curT === 'all') {
    title.textContent = 'Toutes les tables';
    for (let t = 1; t <= T; t++) {
      html += '<div style="font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;margin:10px 0 6px;padding:6px 10px;background:var(--bg2);border-radius:var(--r)">TABLE ' + t + ' — ' + Object.keys(orders[t]||{}).length + '/7 couverts</div>';
      html += renderTable(t);
      tabTot += Object.keys(orders[t] || {}).reduce((s, g) =>
        s + Object.keys(orders[t][g]).reduce((ss, rk) => ss + (orders[t][g][rk].total || 0), 0), 0);
    }
  } else {
    title.textContent = 'Table ' + curT + ' — ' + Object.keys(orders[curT]||{}).length + '/7 couverts';
    html = renderTable(curT);
    tabTot = Object.keys(orders[curT] || {}).reduce((s, g) =>
      s + Object.keys(orders[curT][g]).reduce((ss, rk) => ss + (orders[curT][g][rk].total || 0), 0), 0);
  }

  el.innerHTML = html || '<div class="empty">Aucune commande</div>';
  document.getElementById('table-total-val').textContent = tabTot + '€';
}

function togBody(el) { el.nextElementSibling.classList.toggle('open'); }

function stamp() {
  const now = new Date();
  return { at: now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0'), date: now.toLocaleDateString('fr-FR') };
}

function payGuest(t, g, rk) {
  const s = stamp();
  orders[t][g][rk].paid     = true;
  orders[t][g][rk].paidAt   = s.at;
  orders[t][g][rk].paidDate = s.date;
  syncFirebase();
}
function unpayGuest(t, g, rk) {
  orders[t][g][rk].paid = false;
  delete orders[t][g][rk].paidAt;
  delete orders[t][g][rk].paidDate;
  syncFirebase();
}
function syncFirebase() {
  db.collection('evenement').doc('data').set({ orders, prices })
    .then(() => { renderOrders(); updStats(); })
    .catch(e => console.warn('Erreur sync:', e));
}

function updStats() {
  let done = 0, served = 0, paid = 0, ca = 0;
  for (let t = 1; t <= T; t++) {
    Object.keys(orders[t] || {}).forEach(g => {
      done++;
      const rks = Object.keys(orders[t][g]);
      if (rks.every(r => orders[t][g][r].served)) served++;
      if (rks.every(r => orders[t][g][r].paid))   paid++;
      rks.forEach(rk => { ca += orders[t][g][rk].total || 0; });
    });
  }
  document.getElementById('s-done').textContent   = done;
  document.getElementById('s-served').textContent = served;
  document.getElementById('s-paid').textContent   = paid;
  document.getElementById('s-ca').textContent     = ca + '€';
}

function exportTxt() {
  let txt = 'RÉCAPITULATIF COMMANDES — 25 AVRIL 2025\n' + '='.repeat(44) + '\n\n';
  let totalDone = 0;
  for (let t = 1; t <= T; t++) {
    const tbl  = orders[t] || {};
    const keys = Object.keys(tbl).map(Number).sort((a, b) => a - b);
    txt += 'TABLE ' + t + ' (' + keys.length + '/7 couverts)\n' + '-'.repeat(30) + '\n';
    if (!keys.length) { txt += '  Aucune commande\n\n'; continue; }
    keys.forEach(g => {
      Object.keys(tbl[g]).sort().forEach(rk => {
        const o = tbl[g][rk], parts = [];
        if (o.plat) parts.push('Assortiment viandes');
        const aS = ACC.filter(i => (o.acc[i.id]||0)>0).map(i=>i.label+(o.acc[i.id]>1?' x'+o.acc[i.id]:'')).join('+');
        if (aS) parts.push(aS);
        if (o.dessert === 'degue') parts.push('Dégué');
        const dS = DRINKS.filter(i=>(o.dr[i.id]||0)>0).map(i=>i.label+(o.dr[i.id]>1?' x'+o.dr[i.id]:'')).join('+');
        if (dS) parts.push(dS);
        const eS = ALL_EX.filter(i=>(o.ex[i.id]||0)>0).map(i=>i.label+(o.ex[i.id]>1?' x'+o.ex[i.id]:'')).join('+');
        if (eS) parts.push('EXTRAS:'+eS);
        const svc = Object.keys(tbl[g]).length > 1 ? ' [svc'+rk.replace('r','')+']' : '';
        txt += '  C'+g+svc+' : '+parts.join(' | ')+' — '+(o.total||0)+'€';
        if (o.served) txt += ' [SERVI le '+(o.servedDate||'–')+' à '+(o.servedAt||'–')+']';
        if (o.paid)   txt += ' [RÉGLÉ le '+(o.paidDate||'–')+' à '+(o.paidAt||'–')+']';
        else          txt += ' [EN ATTENTE]';
        txt += '\n'; totalDone++;
      });
    });
    txt += '\n';
  }
  txt += '='.repeat(44)+'\nTOTAL : '+totalDone+' couverts\n';
  const blob = new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download='commandes_25avril_chef.txt'; a.click();
  URL.revokeObjectURL(url);
}
